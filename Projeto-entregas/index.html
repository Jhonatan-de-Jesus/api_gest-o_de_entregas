<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Flash Logística</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <header>
    <h1>🚚 Flash Logística</h1>
    <p>Gerenciamento de Entregas em Tempo Real</p>
  </header>

  <main class="dashboard">

    <!-- FORM -->
    <section class="card">
      <h2>📦 Nova Entrega</h2>

      <div class="form-group">
        <input id="motorista" type="number" placeholder="ID do Motorista">
        <input id="veiculo" type="number" placeholder="ID do Veículo">
        <input id="destino" type="text" placeholder="Destino da Entrega">
      </div>

      <button class="btn-primary" onclick="criarEntregaUI()">
        Criar Entrega
      </button>
    </section>

    <!-- FILTRO -->
    <section class="card">
      <h2>🔎 Filtro</h2>

      <select id="filtro">
        <option value="">Todas</option>
        <option value="pendente">Pendente</option>
        <option value="em rota">Em rota</option>
        <option value="entregue">Entregue</option>
      </select>

      <button class="btn-secondary" onclick="carregarEntregas()">
        Buscar
      </button>
    </section>

    <!-- LISTA -->
    <section class="card full">
      <h2>📋 Entregas</h2>
      <ul id="lista"></ul>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module" src="./js/entregas.js"></script>

</body>
</html>
